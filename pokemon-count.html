<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモン かぞえゲーム</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Maru Gothic Pro', 'Yu Gothic', sans-serif;
      background: #4a7c32;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.8rem;
      gap: 0.6rem;
    }

    /* ===== スコアバー ===== */
    .top-bar {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 460px;
    }

    .chip {
      background: #1a1a2e;
      color: #fff;
      border: 3px solid #000;
      border-radius: 12px;
      padding: 0.35rem 0.9rem;
      font-size: 0.9rem;
      font-weight: bold;
    }

    /* ===== メインカード ===== */
    .game-card {
      width: 100%;
      max-width: 460px;
      border: 4px solid #1a1a2e;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 5px 5px 0 #1a1a2e;
    }

    /* ===== バトル画面 ===== */
    .scene {
      height: 220px;
      background: linear-gradient(to bottom,
        #74c0f5 0%, #b8e4ff 54%,
        #5faa38 54.1%, #4a8a28 100%);
      position: relative;
      overflow: hidden;
    }

    .cloud { position: absolute; font-size: 1.8rem; opacity: 0.9; }

    /* ポケモン表示コンテナ */
    #poke-stage {
      position: absolute;
      top: 10px;
      left: 0; right: 0;
      height: 150px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      padding: 0 8px;
    }

    .stage-poke {
      image-rendering: pixelated;
      filter: drop-shadow(2px 5px 4px rgba(0,0,0,0.3));
      animation: bounce 0.7s ease-in-out infinite alternate;
      flex-shrink: 0;
    }

    /* 数に応じてサイズ変更 */
    .stage-poke.size-1 { width: 110px; }
    .stage-poke.size-2 { width: 95px; }
    .stage-poke.size-3 { width: 80px; }
    .stage-poke.size-4 { width: 68px; }
    .stage-poke.size-5 { width: 58px; }

    .stage-poke.caught { animation: catchAnim 0.85s ease forwards; }
    .stage-poke.fled   { animation: fleeAnim  0.75s ease forwards; }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }
    /* バウンスタイミングをずらす */
    .stage-poke:nth-child(2) { animation-delay: 0.15s; }
    .stage-poke:nth-child(3) { animation-delay: 0.30s; }
    .stage-poke:nth-child(4) { animation-delay: 0.10s; }
    .stage-poke:nth-child(5) { animation-delay: 0.22s; }

    @keyframes catchAnim {
      0%   { transform: scale(1);   opacity: 1; filter: brightness(1); }
      25%  { transform: scale(1.1); opacity: 1; filter: brightness(8) saturate(0); }
      55%  { transform: scale(0.6); opacity: 0.7; }
      100% { transform: scale(0);   opacity: 0; }
    }
    @keyframes fleeAnim {
      0%   { transform: translateX(0);   opacity: 1; }
      30%  { transform: translateX(40px); opacity: 1; }
      100% { transform: translateX(300px); opacity: 0; }
    }

    /* ===== ダイアログ ===== */
    .dialog {
      background: #fff;
      border-top: 4px solid #1a1a2e;
      padding: 0.75rem 1.1rem;
      font-size: 1.05rem;
      font-weight: bold;
      min-height: 3.4rem;
      display: flex;
      align-items: center;
    }

    /* ===== 数えるエリア ===== */
    #count-area {
      background: #eef4ff;
      border-top: 3px solid #c8d8ff;
      padding: 0.9rem 1.1rem 0.7rem;
      text-align: center;
    }

    .question-text {
      font-size: 1.8rem;
      font-weight: bold;
      color: #6c5ce7;
      margin-bottom: 0.7rem;
      letter-spacing: 0.05em;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
    }

    .choice-btn {
      font-family: inherit;
      font-size: 2.6rem;
      font-weight: bold;
      padding: 0.45rem;
      border: 3px solid #1a1a2e;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 4px 0 #1a1a2e;
      color: #fff;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      gap: 2px;
    }
    .choice-btn .dot-row {
      font-size: 0.9rem;
      letter-spacing: -0.05em;
    }
    .choice-btn:nth-child(1) { background: #74b9ff; }
    .choice-btn:nth-child(2) { background: #a29bfe; }
    .choice-btn:nth-child(3) { background: #55efc4; color: #1a1a2e; }
    .choice-btn:nth-child(4) { background: #fd79a8; }

    .choice-btn:hover:not(:disabled)  { transform: translateY(-2px); box-shadow: 0 6px 0 #1a1a2e; }
    .choice-btn:active:not(:disabled) { transform: translateY(3px);  box-shadow: 0 1px 0 #1a1a2e; }
    .choice-btn:disabled { cursor: default; }

    .choice-btn.correct { background: #00b894 !important; color: #fff !important;
                          border-color: #007a61; animation: btnPop 0.3s ease; }
    .choice-btn.wrong   { background: #d63031 !important; color: #fff !important;
                          border-color: #900;   animation: btnShake 0.3s ease; }

    @keyframes btnPop   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    @keyframes btnShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* ===== ゲット祝福画面 ===== */
    #catch-screen {
      display: none;
      background: linear-gradient(150deg, #fff9e6 0%, #ffeaa7 50%, #fdcb6e 100%);
      border-top: 3px solid #e8b800;
      padding: 1.1rem 1.2rem 1rem;
      text-align: center;
      animation: fadeSlideIn 0.35s ease;
    }
    #catch-screen.show { display: block; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .catch-header {
      font-size: 1.35rem;
      font-weight: bold;
      color: #c0392b;
      margin-bottom: 0.6rem;
    }

    .catch-sprite-wrap {
      margin: 0 auto 0.4rem;
      width: 130px; height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      border: 3px solid rgba(255,200,0,0.5);
    }

    #catch-sprite {
      width: 112px;
      image-rendering: pixelated;
      filter: drop-shadow(2px 5px 4px rgba(0,0,0,0.2));
      animation: catchPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes catchPopIn {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      60%  { transform: scale(1.18) rotate(5deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .catch-name  { font-size: 2rem; font-weight: bold; color: #1a1a2e; margin: 0.3rem 0 0.1rem; }
    .catch-genus { font-size: 0.88rem; color: #636e72; margin-bottom: 0.45rem; }

    .catch-desc {
      background: rgba(255,255,255,0.7);
      border-radius: 12px;
      padding: 0.65rem 0.9rem;
      font-size: 0.88rem;
      color: #333;
      line-height: 1.9;
      text-align: left;
      margin-bottom: 0.9rem;
      min-height: 3.5rem;
    }

    .next-btn {
      font-family: inherit;
      font-size: 1.15rem;
      font-weight: bold;
      padding: 0.72rem;
      width: 100%;
      border: 3px solid #1a1a2e;
      border-radius: 14px;
      background: #1a1a2e;
      color: #fdcb6e;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .next-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.35); }

    /* ===== 結果画面 ===== */
    #result-screen { display:none; width:100%; max-width:460px; }
    #result-screen.show { display:block; }

    .result-card {
      background: #fff;
      border: 4px solid #1a1a2e;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 5px 5px 0 #1a1a2e;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .result-title { font-size: 1.7rem; text-align: center; }
    .result-sub   { font-size: 1rem;   text-align: center; color: #636e72; }

    .collection {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.4rem;
    }

    .poke-slot {
      aspect-ratio: 1;
      background: #f0f4ff;
      border: 2px solid #c8d8ff;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 2px;
    }
    .poke-slot img {
      width: 52px;
      image-rendering: pixelated;
      animation: slotPop 0.45s ease both;
    }
    .poke-slot .sname {
      font-size: 0.52rem;
      color: #444;
      text-align: center;
      line-height: 1.3;
    }
    .poke-slot.empty { opacity: 0.3; }
    .poke-slot.empty::before { content: '？'; font-size: 1.6rem; color: #aaa; }

    @keyframes slotPop {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      70%  { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1)   rotate(0);    opacity: 1; }
    }

    /* ===== 星エフェクト ===== */
    .star {
      position: fixed;
      pointer-events: none;
      font-size: 1.6rem;
      z-index: 200;
      animation: starFly 1s ease forwards;
    }
    @keyframes starFly {
      0%   { opacity:1; transform: translate(0,0) scale(1.2); }
      100% { opacity:0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="chip">もんだい <span id="q-num">1</span>/10</div>
  <div class="chip">🔴 げっと <span id="got-count">0</span>ひき</div>
</div>

<!-- クイズ画面 -->
<div class="game-card" id="quiz-screen">
  <div class="scene">
    <span class="cloud" style="top:10px;left:8px">☁️</span>
    <span class="cloud" style="top:24px;right:12px;font-size:1.3rem">☁️</span>
    <div id="poke-stage"></div>
  </div>
  <div class="dialog" id="dialog">よみこみちゅう…⌛</div>

  <!-- 数えるエリア -->
  <div id="count-area">
    <div class="question-text">なんびき いる？</div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- ゲット祝福画面 -->
  <div id="catch-screen">
    <div class="catch-header">🎉 げっとだぜ！ 🎉</div>
    <div class="catch-sprite-wrap">
      <img id="catch-sprite" src="" alt="ポけモン">
    </div>
    <div class="catch-name"  id="catch-name"></div>
    <div class="catch-genus" id="catch-genus"></div>
    <div class="catch-desc"  id="catch-desc"></div>
    <button class="next-btn" id="next-btn">つぎのもんだいへ！ →</button>
  </div>
</div>

<!-- 結果画面 -->
<div id="result-screen">
  <div class="result-card">
    <div class="result-title" id="result-title"></div>
    <div class="result-sub"   id="result-sub"></div>
    <div class="collection"   id="collection"></div>
    <button class="restart-btn" style="
      font-family:inherit;font-size:1.2rem;font-weight:bold;
      padding:0.75rem;border:3px solid #1a1a2e;border-radius:14px;
      background:#fdcb6e;color:#1a1a2e;cursor:pointer;
      box-shadow:0 4px 0 #1a1a2e;transition:transform 0.1s,box-shadow 0.1s;"
      onclick="startGame()">もういちど あそぶ！</button>
  </div>
</div>

<script>
  const TOTAL   = 10;
  const MAX_NUM = 5;   // 4さいむけ：1〜5ひき

  let qNum = 0, gotCount = 0;
  let answerable = false;
  let curPoke = null;
  let curCount = 1;
  let caught  = [];
  let cache   = {};

  // カタカナ → ひらがな
  function kata2hira(s) {
    return [...s].map(c => {
      const code = c.charCodeAt(0);
      return (code >= 0x30A1 && code <= 0x30F6)
        ? String.fromCharCode(code - 0x60) : c;
    }).join('');
  }

  // カタカナにひらがなルビ（表示用）
  function r(str) {
    return str
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/[ァ-ヶー]+/g, m =>
        `<ruby>${m}<rt>${kata2hira(m)}</rt></ruby>`
      );
  }

  // ===== PokéAPI =====
  async function getPoke(id) {
    if (cache[id]) return cache[id];
    const [p, s] = await Promise.all([
      fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r => r.json()),
      fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`).then(r => r.json())
    ]);
    const name =
      s.names.find(n => n.language.name === 'ja-Hrkt')?.name ||
      s.names.find(n => n.language.name === 'ja')?.name || p.name;
    const genus =
      s.genera.find(g => g.language.name === 'ja-Hrkt')?.genus ||
      s.genera.find(g => g.language.name === 'ja')?.genus || '';
    const allFlavors = s.flavor_text_entries;
    const flavorHrkt = allFlavors.find(f => f.language.name === 'ja-Hrkt');
    const flavorJa   = allFlavors.filter(f => f.language.name === 'ja').pop();
    const rawFlavor  = (flavorHrkt || flavorJa)?.flavor_text || '';
    const flavor     = rawFlavor.replace(/[\f\n\r]/g, ' ');
    return cache[id] = { id, name, sprite: p.sprites.front_default, genus, flavor };
  }

  const rand  = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
  const sleep = ms => new Promise(res => setTimeout(res, ms));

  // 数字ドット表示（視覚的ヒント）
  function makeDots(n) {
    const dots = ['●','●●','●●●','●●●●','●●●●●'];
    return dots[n - 1] || '';
  }

  // 選択肢生成（1〜MAX_NUM の範囲）
  function makeChoices(ans) {
    const s = new Set([ans]);
    while (s.size < 4) {
      const v = rand(1, MAX_NUM);
      s.add(v);
    }
    return [...s].sort(() => Math.random() - 0.5);
  }

  // ===== ポケモン表示 =====
  function renderStage(sprite, count, cls) {
    const stage = document.getElementById('poke-stage');
    stage.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const img = document.createElement('img');
      img.src = sprite;
      img.className = `stage-poke size-${count} ${cls || ''}`;
      img.alt = 'ポケモン';
      stage.appendChild(img);
    }
  }

  // ===== 祝福画面 =====
  async function showCatchScreen(poke) {
    document.getElementById('count-area').style.display  = 'none';
    document.getElementById('catch-sprite').src          = poke.sprite;
    document.getElementById('catch-name').innerHTML      = r(poke.name);
    document.getElementById('catch-genus').textContent   = kata2hira(poke.genus);
    document.getElementById('catch-desc').textContent    = kata2hira(poke.flavor) || '（せつめいなし）';
    document.getElementById('catch-screen').classList.add('show');
  }

  function hideCatchScreen() {
    document.getElementById('catch-screen').classList.remove('show');
    document.getElementById('count-area').style.display = '';
  }

  function waitForNext() {
    return new Promise(resolve => {
      document.getElementById('next-btn').onclick = resolve;
    });
  }

  // ===== ゲーム開始 =====
  function startGame() {
    qNum = 0; gotCount = 0; caught = [];
    document.getElementById('result-screen').classList.remove('show');
    document.getElementById('quiz-screen').style.display = '';
    document.getElementById('got-count').textContent = 0;
    hideCatchScreen();
    nextQ();
  }

  async function nextQ() {
    answerable = false;
    qNum++;
    document.getElementById('q-num').textContent  = qNum;
    document.getElementById('dialog').textContent = 'よみこみちゅう…⌛';
    document.getElementById('choices').innerHTML  = '';
    document.getElementById('poke-stage').innerHTML = '';

    curPoke  = await getPoke(rand(1, 151));
    curCount = rand(1, MAX_NUM);

    renderStage(curPoke.sprite, curCount, 'idle');

    document.getElementById('dialog').innerHTML =
      `${r(curPoke.name)} が でてきた！なんびき いる？`;

    makeChoices(curCount).forEach(v => {
      const btn = document.createElement('button');
      btn.className   = 'choice-btn';
      btn.innerHTML   = `${v}<div class="dot-row">${makeDots(v)}</div>`;
      btn.onclick     = () => onAnswer(btn, v, curCount);
      document.getElementById('choices').appendChild(btn);
    });

    answerable = true;
  }

  // ===== 回答処理 =====
  async function onAnswer(btn, val, ans) {
    if (!answerable) return;
    answerable = false;
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

    if (val === ans) {
      btn.classList.add('correct');
      beep(true);
      document.getElementById('dialog').innerHTML =
        `せいかい！${r(curPoke.name)} を げっとした！🎉`;
      renderStage(curPoke.sprite, curCount, 'caught');
      gotCount++;
      caught.push(curPoke);
      document.getElementById('got-count').textContent = gotCount;
      spawnStars();

      await sleep(800);
      await showCatchScreen(curPoke);
      await waitForNext();
      hideCatchScreen();

    } else {
      btn.classList.add('wrong');
      // 正解ボタンを光らせる
      document.querySelectorAll('.choice-btn').forEach(b => {
        const num = parseInt(b.textContent);
        if (num === ans) b.classList.add('correct');
      });
      beep(false);
      document.getElementById('dialog').innerHTML =
        `ざんねん！${r(curPoke.name)} は にげてしまった！`;
      renderStage(curPoke.sprite, curCount, 'fled');
      await sleep(1700);
    }

    if (qNum >= TOTAL) showResult();
    else nextQ();
  }

  // ===== 結果画面 =====
  function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').classList.add('show');

    const pct = gotCount / TOTAL;
    document.getElementById('result-title').innerHTML =
      pct === 1   ? '🏆 ぜんぶ せいかい！さいこう！' :
      pct >= 0.7  ? '😊 よくできました！'             :
      pct >= 0.4  ? '👍 もうすこし！がんばれ！'       :
                    '💪 またちょうせんしよう！';
    document.getElementById('result-sub').innerHTML =
      `10もんちゅう ${gotCount}ひき げっとしたよ！`;

    const grid = document.getElementById('collection');
    grid.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
      const slot = document.createElement('div');
      if (caught[i]) {
        slot.className = 'poke-slot';
        const img = document.createElement('img');
        img.src = caught[i].sprite;
        img.style.animationDelay = (i * 0.07) + 's';
        const nm = document.createElement('div');
        nm.className = 'sname';
        nm.innerHTML = r(caught[i].name);
        slot.append(img, nm);
      } else {
        slot.className = 'poke-slot empty';
      }
      grid.appendChild(slot);
    }
  }

  // ===== 効果音 =====
  function beep(ok) {
    try {
      const ctx = new AudioContext();
      const g   = ctx.createGain();
      g.connect(ctx.destination);
      if (ok) {
        [[523,0],[659,.12],[784,.24],[1047,.38]].forEach(([f, t]) => {
          const o = ctx.createOscillator();
          o.connect(g); o.frequency.value = f;
          g.gain.setValueAtTime(.2, ctx.currentTime + t);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .16);
          o.start(ctx.currentTime + t);
          o.stop(ctx.currentTime + t + .18);
        });
      } else {
        const o = ctx.createOscillator();
        o.connect(g);
        o.frequency.value = 220;
        o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + .5);
        g.gain.setValueAtTime(.25, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .55);
        o.start(); o.stop(ctx.currentTime + .6);
      }
    } catch (_) {}
  }

  // ===== 星エフェクト =====
  function spawnStars() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 3;
    [...'🌟✨⭐💫🌟✨⭐💫'].forEach((em, i) => {
      const el = document.createElement('div');
      el.className = 'star';
      el.textContent = em;
      const a = (i / 8) * Math.PI * 2;
      el.style.cssText =
        `left:${cx}px;top:${cy}px;` +
        `--tx:${Math.cos(a) * 110}px;` +
        `--ty:${Math.sin(a) * 85}px;` +
        `animation-delay:${i * 0.04}s`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    });
  }

  startGame();
</script>
</body>
</html>
